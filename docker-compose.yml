services:
  app:
    build: .
    container_name: devwell_app
    # Plus d'exposition directe : l'app n'est accessible que via le proxy Caddy.
    expose:
      - "80"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: "mysql://${DB_USER:-app}:${DB_PASSWORD:-!ChangeMe!}@database:3306/${DB_NAME:-devwell}?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"
      MONGODB_URL: ${MONGODB_URL}
    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started
    volumes:
      - .:/var/www/html
    restart: unless-stopped
    networks:
      - devwell_net

  database:
    image: mariadb:10.11
    container_name: devwell_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-devwell}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-!ChangeMe!}
    volumes:
      - mariadb_data:/var/lib/mysql
    # NOTE SÉCURITÉ PROD :
    # - En production, il est fortement recommandé de supprimer l'exposition du port 3306
    #   pour empêcher tout accès direct à MariaDB depuis l'extérieur.
    # - L'application doit accéder à la base uniquement via le réseau interne Docker.
    # Pour la dev locale, tu peux laisser ce port exposé si tu as besoin d'un client SQL.
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    networks:
      - devwell_net

  mongodb:
    image: mongo:latest
    container_name: devwell_mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - devwell_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: devwell_mailpit
    ports:
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped
    networks:
      - devwell_net

  caddy:
    image: caddy:latest
    container_name: devwell_caddy
    # Point d'entrée unique HTTP/HTTPS. En prod, pointer un vrai domaine vers cette machine.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Volumes persistants pour conserver certificats et configuration ACME
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - devwell_net

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: devwell_stripe_cli
    env_file:
      - .env
      - .env.local
    # Clé secrète pour écouter les vrais événements ; forward HTTP vers l'app (Docker = HTTP simple)
    command: listen --api-key $$STRIPE_SECRET_KEY --forward-to http://app/webhook/stripe --skip-verify
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - devwell_net

volumes:
  mariadb_data:
  mongodb_data:
  # Volumes pour la persistance des certificats Caddy (TLS / ACME)
  caddy_data:
  caddy_config:

networks:
  devwell_net:
    driver: bridge
