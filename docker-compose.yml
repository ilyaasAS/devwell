services:
  app:
    build: .
    container_name: devwell_app
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: "mysql://${DB_USER:-app}:${DB_PASSWORD:-!ChangeMe!}@database:3306/${DB_NAME:-devwell}?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"
      MONGODB_URL: ${MONGODB_URL}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    restart: unless-stopped

  database:
    image: mariadb:10.11
    container_name: devwell_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-devwell}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-!ChangeMe!}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: devwell_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  mariadb_data: