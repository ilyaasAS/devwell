services:
  app:
    build: .
    container_name: devwell_app
    expose:
      - "80"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      DATABASE_URL: "mysql://${DB_USER:-app}:${DB_PASSWORD:-!ChangeMe!}@database:3306/${DB_NAME:-devwell}?serverVersion=10.11.2-MariaDB&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"
      MONGODB_URL: ${MONGODB_URL}
    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started
    restart: unless-stopped
    networks:
      - devwell_net

  database:
    image: mariadb:10.11
    container_name: devwell_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-devwell}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-!ChangeMe!}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    networks:
      - devwell_net

  mongodb:
    image: mongo:latest
    container_name: devwell_mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - devwell_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: devwell_mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped
    networks:
      - devwell_net

  caddy:
    image: caddy:latest
    container_name: devwell_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - devwell_net

volumes:
  mariadb_data:
  mongodb_data:
  caddy_data:
  caddy_config:

networks:
  devwell_net:
    driver: bridge

